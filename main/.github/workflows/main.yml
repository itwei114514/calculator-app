name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04  # 固定 22.04，避免 24.04 交叉编译兼容性问题
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'  # p4a/buildozer 兼容性最佳的版本
    
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential git zip unzip openjdk-17-jdk \
          pkg-config autoconf automake python3-dev \
          zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev \
          libssl-dev libreadline-dev libffi-dev libsqlite3-dev \
          wget libbz2-dev libltdl-dev
    
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        # 🔑 核心修复：绝对不要手动指定 python-for-android 版本！
        # buildozer 会自动拉取完全匹配的 p4a 版本，手动指定必冲突
        pip install cython kivy buildozer
    
    - name: Prepare Project & Spec
      run: |
        cp calculator_app.py main.py
        rm -rf .buildozer bin
        
        cat > buildozer.spec << 'EOF'
        [app]
        title = Scientific Calculator
        package.name = calculator
        package.domain = org.example
        source.dir = .
        source.include_exts = py
        version = 1.0
        # ⚠️ 这里只能写 APP 运行需要的 Python 库，绝不能写构建工具
        requirements = python3,kivy
        android.permissions = INTERNET
        android.archs = arm64-v8a
        android.api = 34
        android.minapi = 21
        orientation = portrait

        [buildozer]
        log_level = 2
        EOF
    
    - name: Build APK
      run: |
        # 🔑 核心修复：使用 python -m 调用，彻底避开 PATH 环境变量导致的 command not found
        python -m buildozer android clean
        python -m buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: calculator-apk
        path: bin/*.apk
