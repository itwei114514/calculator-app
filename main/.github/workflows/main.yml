name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04  # 22.04 对交叉编译环境更稳定
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'  # p4a/buildozer 对 3.10 兼容性最佳
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git zip unzip openjdk-17-jdk pkg-config autoconf automake python3-dev zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev wget libbz2-dev
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        java -version
    
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip setuptools wheel
        pip install Cython
        pip install kivy
        pip install buildozer
        # python-for-android 会作为 buildozer 的依赖自动安装，无需手动指定版本
    
    - name: Verify installations
      run: |
        python -c "import kivy; print('Kivy version:', kivy.__version__)"
        buildozer --version
    
    - name: Prepare project files
      run: |
        cp calculator_app.py main.py
        ls -la
    
    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
        [app]
        title = Scientific Calculator
        package.name = calculator
        package.domain = org.example
        source.dir = .
        source.include_exts = py
        version = 1.0
        # ⚠️ 绝对不要在这里写 python-for-android，它是构建工具，不是运行时依赖
        requirements = python3,kivy
        android.permissions = INTERNET
        android.archs = arm64-v8a
        android.api = 34
        android.minapi = 21
        orientation = portrait

        [buildozer]
        log_level = 2
        EOF
        cat buildozer.spec
    
    - name: Clean build directory
      run: |
        rm -rf .buildozer/
        rm -rf bin/
    
    - name: Build APK
      run: |
        echo "Starting build process..."
        buildozer android clean
        buildozer android debug
    
    - name: Check build results
      run: |
        echo "Looking for APK files..."
        find . -name "*.apk" -type f -exec ls -la {} \;
        ls -la bin/ 2>/dev/null || echo "No bin directory"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: calculator-apk
        path: bin/*.apk
