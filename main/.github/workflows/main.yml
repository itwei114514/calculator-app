name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git zip unzip openjdk-17-jdk \
          pkg-config autoconf automake python3-dev zlib1g-dev libncurses5-dev \
          libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev \
          libsqlite3-dev wget libbz2-dev libltdl-dev
    
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        # 清理可能缓存的错误元数据
        pip install --no-cache-dir cython kivy
        # 🔑 核心修复：PyPI 的 buildozer 1.5.0 依赖已损坏，此处直接从 GitHub 拉取官方修复版
        pip install --no-cache-dir git+https://github.com/kivy/buildozer.git@master
    
    - name: Prepare Project
      run: |
        cp calculator_app.py main.py
        rm -rf .buildozer bin
        cat > buildozer.spec << 'EOF'
        [app]
        title = Scientific Calculator
        package.name = calculator
        package.domain = org.example
        source.dir = .
        source.include_exts = py
        version = 1.0
        requirements = python3,kivy
        android.permissions = INTERNET
        android.archs = arm64-v8a
        android.api = 34
        android.minapi = 21
        orientation = portrait

        [buildozer]
        log_level = 2
        EOF
    
    - name: Build APK
      run: |
        # 🔑 使用 python -m 调用，彻底避开 PATH 环境变量问题
        python -m buildozer android clean
        python -m buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: calculator-apk
        path: bin/*.apk
