name: Build Kivy APK

on:
  push:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-22.04  # 锁定 22.04，避免 24.04 底层库版本冲突
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential git zip unzip openjdk-17-jdk \
          pkg-config autoconf automake python3-dev \
          zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev \
          libssl-dev libreadline-dev libffi-dev libsqlite3-dev \
          wget libbz2-dev libltdl-dev
    
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        # 🔑 核心修复 1：绝不手动安装 python-for-android！让 buildozer 全自动管理
        pip install --no-cache-dir "Cython>=3.0" "kivy>=2.2"
        pip install --no-cache-dir git+https://github.com/kivy/buildozer.git
    
    - name: Prepare Project
      run: |
        cp calculator_app.py main.py
        # 🔑 核心修复 2：彻底清除所有缓存，杜绝脏状态
        rm -rf .buildozer ~/.buildozer bin/
        
        cat > buildozer.spec << 'EOF'
        [app]
        title = Scientific Calculator
        package.name = calculator
        package.domain = org.kivy.calculator
        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas
        version = 1.0
        # 只声明 APP 运行时依赖
        requirements = python3,kivy
        android.permissions = INTERNET
        android.archs = arm64-v8a
        android.api = 34
        android.minapi = 21
        orientation = portrait

        [buildozer]
        log_level = 2
        warn_on_root = 1
        # 🔑 核心修复 3：强制指定 p4a 分支，避免 git 克隆中断导致目录为空
        p4a.branch = master
        EOF
    
    - name: Build APK
      run: |
        # 🔑 核心修复 4：首次构建绝对不要用 clean！直接用 -v 看完整日志
        python -m buildozer -v android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: calculator-apk
        path: bin/*.apk
