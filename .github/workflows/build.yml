name: Build Kivy APK

on:
  push:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    # 🔑 核心修复 1：使用官方 Java 配置动作，彻底解决 UnsupportedClassVersionError
    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential git zip unzip \
          pkg-config autoconf automake python3-dev \
          zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev \
          libssl-dev libreadline-dev libffi-dev libsqlite3-dev \
          wget libbz2-dev libltdl-dev
    
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install --no-cache-dir "Cython>=3.0" "kivy>=2.2"
        pip install --no-cache-dir git+https://github.com/kivy/buildozer.git
    
    - name: Prepare Project & Spec
      run: |
        cp calculator_app.py main.py
        rm -rf .buildozer ~/.buildozer bin/
        
        cat > buildozer.spec << 'EOF'
        [app]
        title = Scientific Calculator
        package.name = calculator
        package.domain = org.kivy.calculator
        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas
        version = 1.0
        requirements = python3,kivy
        android.permissions = INTERNET
        android.archs = arm64-v8a
        android.api = 34
        android.minapi = 21
        android.build_tools_version = 34.0.0
        orientation = portrait

        [buildozer]
        log_level = 2
        warn_on_root = 1
        p4a.branch = master
        EOF
    
    - name: 🔑 Initialize Android SDK & NDK
      run: |
        # 确保使用刚安装的 Java 17
        export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
        
        SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
        mkdir -p "$SDK_DIR/cmdline-tools"
        
        # 下载官方命令行工具
        wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -O /tmp/cmdline.zip
        unzip -q /tmp/cmdline.zip -d /tmp/cmdline
        mv /tmp/cmdline/cmdline-tools "$SDK_DIR/cmdline-tools/latest"
        
        export ANDROID_SDK_ROOT="$SDK_DIR"
        export PATH="$SDK_DIR/cmdline-tools/latest/bin:$PATH"
        
        # 自动接受许可并安装核心组件
        yes | sdkmanager --licenses > /dev/null 2>&1 || true
        sdkmanager "platforms;android-34" \
                   "build-tools;34.0.0" \
                   "platform-tools" \
                   "ndk;25.2.9519653"
        
        rm -f /tmp/cmdline.zip
        rm -rf /tmp/cmdline
    
    - name: Build APK
      run: |
        export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
        export ANDROID_SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
        export ANDROID_NDK_HOME="$ANDROID_SDK_ROOT/ndk/25.2.9519653"
        
        # 使用 -v 输出完整日志，方便观察编译进度
        python -m buildozer -v android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: calculator-apk
        path: bin/*.apk
