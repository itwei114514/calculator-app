name: Build Kivy APK

on:
  push:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential git zip unzip \
          pkg-config autoconf automake python3-dev \
          zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev \
          libssl-dev libreadline-dev libffi-dev libsqlite3-dev \
          wget libbz2-dev libltdl-dev libncursesw5-dev
    
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install --no-cache-dir "Cython>=3.0" "kivy>=2.2"
        pip install --no-cache-dir git+https://github.com/kivy/buildozer.git
    
    - name: Prepare Project & Spec
      run: |
        # 确保主文件存在
        if [ ! -f calculator_app.py ]; then
          echo "print('Hello')" > calculator_app.py
        fi
        cp calculator_app.py main.py
        rm -rf .buildozer bin/
        # 清理全局 buildozer 缓存以防冲突
        rm -rf ~/.buildozer
        
        cat > buildozer.spec << 'EOF'
        [app]
        title = Scientific Calculator
        package.name = calculator
        package.domain = org.kivy.calculator
        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas
        version = 1.0
        requirements = python3,kivy
        android.permissions = INTERNET
        android.archs = arm64-v8a
        android.api = 34
        android.minapi = 21
        android.build_tools_version = 34.0.0
        orientation = portrait

        [buildozer]
        log_level = 2
        warn_on_root = 1
        p4a.branch = master
        EOF
    
    - name: 🔑 Initialize Android SDK & NDK (Fixed Structure)
      run: |
        # 定义路径
        SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
        NDK_VERSION="25.2.9519653"
        
        mkdir -p "$SDK_DIR/cmdline-tools"
        
        # 下载官方命令行工具
        echo "Downloading Android Command Line Tools..."
        wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -O /tmp/cmdline.zip
        unzip -q /tmp/cmdline.zip -d /tmp/cmdline
        mv /tmp/cmdline/cmdline-tools "$SDK_DIR/cmdline-tools/latest"
        
        # 🚀 核心修复：创建旧版工具链的软链接，满足 Buildozer 的路径检查
        ln -s "$SDK_DIR/cmdline-tools/latest" "$SDK_DIR/tools"
        
        # 设置环境变量并写入 GITHUB_ENV 以便后续步骤使用
        echo "ANDROID_SDK_ROOT=$SDK_DIR" >> $GITHUB_ENV
        echo "ANDROID_HOME=$SDK_DIR" >> $GITHUB_ENV
        echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
        
        # 配置 PATH
        export PATH="$SDK_DIR/cmdline-tools/latest/bin:$SDK_DIR/platform-tools:$PATH"
        
        # 接受许可并安装组件
        echo "Installing SDK components..."
        yes | sdkmanager --licenses > /dev/null 2>&1 || true
        sdkmanager "platforms;android-34" \
                   "build-tools;34.0.0" \
                   "platform-tools" \
                   "ndk;$NDK_VERSION"
        
        # 设置 NDK 环境变量
        echo "ANDROID_NDK_HOME=$SDK_DIR/ndk/$NDK_VERSION" >> $GITHUB_ENV
        
        # 清理临时文件
        rm -f /tmp/cmdline.zip
        rm -rf /tmp/cmdline
        
        # 验证 sdkmanager 是否可访问（调试用）
        if [ -f "$SDK_DIR/tools/bin/sdkmanager" ]; then
          echo "✅ SDK Manager symlink verified at $SDK_DIR/tools/bin/sdkmanager"
        else
          echo "❌ SDK Manager symlink failed!"
          exit 1
        fi

    - name: Build APK
      run: |
        # 重新导出环境变量（确保在当前的 run  shell 中生效）
        export ANDROID_SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
        export ANDROID_HOME="$ANDROID_SDK_ROOT"
        export ANDROID_NDK_HOME="$ANDROID_SDK_ROOT/ndk/25.2.9519653"
        export JAVA_HOME="$JAVA_HOME"
        export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
        
        # 清理可能存在的缓存冲突
        rm -rf .buildozer/android/platform/build
        
        # 开始构建
        python -m buildozer -v android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: calculator-apk
        path: bin/*.apk
        if-no-files-found: error
