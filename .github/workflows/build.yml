name: Build Kivy APK

on:
  push:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential git zip unzip openjdk-17-jdk \
          pkg-config autoconf automake python3-dev \
          zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev \
          libssl-dev libreadline-dev libffi-dev libsqlite3-dev \
          wget libbz2-dev libltdl-dev
    
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install --no-cache-dir "Cython>=3.0" "kivy>=2.2"
        pip install --no-cache-dir git+https://github.com/kivy/buildozer.git
    
    - name: Prepare Project & Spec
      run: |
        cp calculator_app.py main.py
        rm -rf .buildozer ~/.buildozer bin/
        
        cat > buildozer.spec << 'EOF'
        [app]
        title = Scientific Calculator
        package.name = calculator
        package.domain = org.kivy.calculator
        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas
        version = 1.0
        requirements = python3,kivy
        android.permissions = INTERNET
        android.archs = arm64-v8a
        android.api = 34
        android.minapi = 21
        # 🔑 核心修复 1：锁定稳定版 build-tools，避开 37.0.0 的 CI 许可 Bug
        android.build_tools_version = 34.0.0
        orientation = portrait

        [buildozer]
        log_level = 2
        warn_on_root = 1
        p4a.branch = master
        EOF
    
    - name: Build APK
      run: |
        # 🔑 核心修复 2：提前注入 Google 官方许可哈希，彻底绕过交互式确认
        LICENSES_DIR="$HOME/.buildozer/android/platform/android-sdk/licenses"
        mkdir -p "$LICENSES_DIR"
        echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > "$LICENSES_DIR/android-sdk-license"
        echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> "$LICENSES_DIR/android-sdk-license"
        
        # 🔑 核心修复 3：移除无效参数，使用标准命令
        python -m buildozer -v android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: calculator-apk
        path: bin/*.apk
