name: Build APK

on:
  push:
分支: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        pip install Cython
        pip install buildozer
    
    - name: Setup Android SDK
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-8-jdk
        echo "JAVA_HOME=/usr/lib/jvm/java-8-openjdk-amd64" >> $GITHUB_ENV
        export JAVA_HOME=/usr/lib/jvm/java-8-openjdk-amd64
        java -version
    
    - name: Prepare project
      run: |
        ls -la
        python -c "import kivy; print('Kivy installed')"
    
    - name: Create main.py
      run: |
        cp calculator_app.py main.py
        echo "File created:"
        ls -la main.py
    
    - name: Create requirements.txt
      run: |
        echo "kivy==2.2.1" > requirements.txt
        cat requirements.txt
    
    - name: Create buildozer.spec
      run: |
        buildozer init || echo "buildozer init failed, creating manually"
        
        # Manual creation of buildozer.spec
        cat > buildozer.spec << EOF
[app]
title = Scientific Calculator
package.name = calculator
package.domain = org.example

source.dir = .
source.include_exts = py

version = 1.0
requirements = python3,kivy
android.permissions = INTERNET

android.arch = arm64-v8a
android.api = 33
android.minapi = 21
android.sdk = 33
android.ndk = 25b

orientation = portrait

[buildozer]
log_level = 2
EOF
        cat buildozer.spec
    
    - name: Build APK
      run: |
        pip install kivy
        buildozer android debug
      continue-on-error: true
    
    - name: Show bin directory
      run: |
        ls -la bin/ || echo "No bin directory"
    
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: calculator-apk
        path: bin/*.apk
      continue-on-error: true
