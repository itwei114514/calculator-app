name: Build Kivy APK

on:
  push:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-22.04  # 必须固定 22.04，24.04 交叉编译必踩坑
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'  # p4a 兼容性最佳版本
    
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential git zip unzip openjdk-17-jdk \
          pkg-config autoconf automake python3-dev \
          zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev \
          libssl-dev libreadline-dev libffi-dev libsqlite3-dev \
          wget libbz2-dev libltdl-dev
    
    - name: Install Python Dependencies (严格按此顺序)
      run: |
        python -m pip install --upgrade pip setuptools wheel
        # 1. 清除缓存，防止 pip 读取到错误的元数据
        pip install --no-cache-dir "Cython>=3.0" "kivy>=2.2"
        # 2. 手动安装一个真实存在的 p4a 版本，提前占位
        pip install --no-cache-dir "python-for-android>=2024.1.21"
        # 3. 从 GitHub 安装 buildozer (彻底跳过 PyPI 1.5.0 的幽灵依赖)
        pip install --no-cache-dir git+https://github.com/kivy/buildozer.git
    
    - name: Verify Installation
      run: |
        python -c "import kivy; print('Kivy:', kivy.__version__)"
        python -m buildozer --version
        python -c "import pythonforandroid; print('p4a OK')"
    
    - name: Prepare Project & Spec
      run: |
        cp calculator_app.py main.py
        rm -rf .buildozer bin
        
        cat > buildozer.spec << 'EOF'
        [app]
        title = Scientific Calculator
        package.name = calculator
        package.domain = org.kivy.calculator
        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas
        version = 1.0
        # 只写 APP 运行时需要的库，绝不写构建工具
        requirements = python3,kivy
        android.permissions = INTERNET
        android.archs = arm64-v8a
        android.api = 34
        android.minapi = 21
        orientation = portrait

        [buildozer]
        log_level = 2
        warn_on_root = 1
        EOF
    
    - name: Build APK
      run: |
        # 🔑 使用 python -m 调用，100% 避开 PATH 环境变量问题
        python -m buildozer android clean
        python -m buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: calculator-apk
        path: bin/*.apk
